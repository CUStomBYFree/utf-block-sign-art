<!DOCTYPE html>
<html lang="zh-Hans">

<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width" />
  <title>方块字告示牌生成器</title>
  <link rel="icon" href="sign.webp" type="image/webp" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="fonts/fonts.css" />
</head>

<body>
  <h1>方块字告示牌生成器</h1>
  <div id="leftPanel">
    <div class="config-section">
      <div class="config-item">
        <label class="config-item-label">输入文字</label>
        <textarea class="autoWidth" placeholder="在此输入文字...">←换乘 1 号线&#10;←To Line 1</textarea>
      </div>

      <!-- Minecraft版本 -->
      <div class="config-item">
        <label class="config-item-label">Minecraft版本</label>
        <div class="config-item-content">
          <label class="radio-option">
            <input type="radio" class="edition" name="edition" value="je" checked />
            <img src="edition-je.webp" alt="Java版" />
            <span>Java版</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="edition" name="edition" value="be" />
            <img src="edition-be.webp" alt="基岩版" />
            <span>基岩版</span>
          </label>
        </div>
      </div>

      <!-- 告示牌类型 -->
      <div class="config-item">
        <label class="config-item-label">告示牌类型</label>
        <div class="config-item-content">
          <label class="radio-option">
            <input type="radio" class="signType" name="signType" value="sign" checked />
            <img src="signType-sign.webp" alt="告示牌" />
            <span>告示牌</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="signType" name="signType" value="hangingSign" />
            <img src="signType-hangingSign.webp" alt="悬挂式告示牌" />
            <span>悬挂式告示牌</span>
          </label>
        </div>
      </div>

      <!-- 字体选择 -->
      <div class="config-item">
        <label class="config-item-label">字体</label>
        <div id="fontSelect" class="custom-select">
          <div class="custom-select-trigger">
            <span id="fontSelectText">Chill Bitmap 7px</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="custom-select-dropdown">
            <div class="custom-select-option" data-value="Chill Bitmap 7px"
              style="font-family: 'Chill Bitmap 7px', monospace;">Chill Bitmap 7px</div>
            <div class="custom-select-option" data-value="精品點陣體7×7 1.71"
              style="font-family: '精品點陣體7×7 1.71', monospace;">精品點陣體7×7 1.71</div>
            <div class="custom-select-option" data-value="QuanPixel 8px"
              style="font-family: 'QuanPixel 8px', monospace;">QuanPixel 8px</div>
            <div class="custom-select-option" data-value="Fusion Pixel 8px Proportional"
              style="font-family: 'Fusion Pixel 8px Proportional', monospace;">Fusion Pixel 8px Proportional</div>
            <div class="custom-select-option" data-value="Fusion Pixel 8px Monospaced"
              style="font-family: 'Fusion Pixel 8px Monospaced', monospace;">Fusion Pixel 8px Monospaced</div>
            <div class="custom-select-option" data-value="GuanZhi" style="font-family: 'GuanZhi', monospace;">GuanZhi
            </div>
            <div class="custom-select-option" data-value="美績點陣體" style="font-family: '美績點陣體', monospace;">美績點陣體</div>
            <div class="custom-select-option" data-value="美績點陣體 - 明" style="font-family: '美績點陣體 - 明', monospace;">
              美績點陣體 - 明</div>
            <div class="custom-select-divider"></div>
            <input id="fontCustomInput" class="custom-select-input" type="text" placeholder="输入自定义字体..." />
          </div>
        </div>
      </div>

      <!-- 字符模式 -->
      <div class="config-item">
        <label class="config-item-label">字符模式</label>
        <div class="config-item-content">
          <label class="radio-option">
            <input type="radio" onclick="setPattern('1.0')" class="patternSelect" name="patternSelect" value="1.0"
              checked />
            <span class="char-symbol">▞</span><span>1.0~1.19.4</span>
          </label>
          <label class="radio-option">
            <input type="radio" onclick="setPattern('1.20')" class="patternSelect" name="patternSelect" value="1.20" />
            <span class="char-symbol">◛◚</span><span>1.20+</span>
          </label>
          <label class="radio-option">
            <input type="radio" onclick="setPattern('1.20-wide')" class="patternSelect" name="patternSelect"
              value="1.20-wide" />
            <span class="char-symbol">▄▀</span><span>1.20+ 宽</span>
          </label>
          <label class="radio-option">
            <input type="radio" onclick="setPattern('braille')" class="patternSelect" name="patternSelect"
              value="braille" />
            <span class="char-symbol">⣤⠛</span><span>盲文</span>
          </label>
          <label class="radio-option">
            <input type="radio" onclick="togglePatternSection()" class="patternSelect" name="patternSelect"
              value="custom" />
            <span>自定义</span>
          </label>
        </div>
        <div id="patternSection" class="custom-char-section">
          <div id="patternWrapper"></div>
          <template id="patternTemplate">
            <label>
              <code></code>
              <input name="pattern" value="" />
            </label>
          </template>
        </div>
      </div>

    </div>
    <button type="button" onclick="main()" class="btn-primary">绘制</button>
  </div>
  <div id="rightPanel">
    <div id="previewWrapper">
      <div>预览</div>
      <div id="canvasWrapper"></div>
    </div>
    <div id="outputWrapper">
      <div class="output-title">输出结果</div>
      <div id="signsWrapper"></div>
    </div>
  </div>

  <script src="char.js"></script>
  <script src="main.js"></script>
</body>

</html>
