<!DOCTYPE html>
<html lang="zh-Hans">

<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width" />
  <title>方块字告示牌生成器</title>
  <link rel="icon" href="signType-sign.webp" type="image/webp" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="fonts/fonts.css" />
</head>

<body>
  <h1>方块字告示牌生成器</h1>
  <div id="leftPanel">
    <div class="config-section">
      <div class="config-item">
        <label class="config-item-label">输入文字</label>
        <div id="textInputWrapper" class="textInput-wrapper">
          <div id="textInput" class="autoWidth" contenteditable="true">←换乘 1 号线 ←To Line 1</div>
          <div id="highlightOverlay" class="highlightOverlay"></div>
        </div>
      </div>

      <!-- Minecraft版本 -->
      <div id="editionSection" class="config-item">
        <label class="config-item-label">Minecraft版本</label>
        <div class="config-item-content">
          <label class="radio-option">
            <input type="radio" class="edition" name="edition" value="je" checked />
            <img src="edition-je.webp" alt="Java版" />
            <span>Java版</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="edition" name="edition" value="be" />
            <img src="edition-be.webp" alt="基岩版" />
            <span>基岩版</span>
          </label>
        </div>
      </div>

      <!-- 告示牌类型 -->
      <div class="config-item">
        <label class="config-item-label">告示牌类型</label>
        <div class="config-item-content">
          <label class="radio-option">
            <input type="radio" class="signType" name="signType" value="sign" checked />
            <img src="signType-sign.webp" alt="告示牌" />
            <span>告示牌</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="signType" name="signType" value="hangingSign" />
            <img src="signType-hangingSign.webp" alt="悬挂式告示牌" />
            <span>悬挂式告示牌</span>
          </label>
        </div>
      </div>

      <!-- 字体选择 -->
      <div class="config-item">
        <label class="config-item-label">字体</label>
        <div id="fontSelect" class="custom-select">
          <div class="custom-select-trigger">
            <span id="fontSelectText">Chill Bitmap 7px</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="custom-select-dropdown">
            <div class="custom-select-option" data-value="Chill Bitmap 7px"
              style="font-family: 'Chill Bitmap 7px', monospace;">Chill Bitmap 7px</div>
            <div class="custom-select-option" data-value="精品點陣體7×7 1.71"
              style="font-family: '精品點陣體7×7 1.71', monospace;">精品點陣體7×7 1.71</div>
            <div class="custom-select-option" data-value="QuanPixel 8px"
              style="font-family: 'QuanPixel 8px', monospace;">QuanPixel 8px</div>
            <div class="custom-select-option" data-value="Fusion Pixel 8px Proportional"
              style="font-family: 'Fusion Pixel 8px Proportional', monospace;">Fusion Pixel 8px Proportional</div>
            <div class="custom-select-option" data-value="Fusion Pixel 8px Monospaced"
              style="font-family: 'Fusion Pixel 8px Monospaced', monospace;">Fusion Pixel 8px Monospaced</div>
            <div class="custom-select-option" data-value="GuanZhi 8px" style="font-family: 'GuanZhi 8px', monospace;">
              GuanZhi 8px
            </div>
            <div class="custom-select-option" data-value="美績點陣體" style="font-family: '美績點陣體', monospace;">美績點陣體</div>
            <div class="custom-select-option" data-value="美績點陣體 - 明" style="font-family: '美績點陣體 - 明', monospace;">
              美績點陣體 - 明</div>
            <div class="custom-select-option" data-value="Five" style="font-family: 'Five', monospace;">Five</div>
            <div class="custom-select-option" data-value="Mojang Regular"
              style="font-family: 'Mojang Regular', monospace;">Mojang Regular</div>
            <div class="custom-select-option" data-value="Public Pixel" style="font-family: 'Public Pixel', monospace;">
              Public Pixel</div>
            <div class="custom-select-option" data-value="袖珍像素体" style="font-family: '袖珍像素体', monospace;">袖珍像素体</div>

            <input id="fontCustomInput" class="custom-select-input" type="text" placeholder="输入自定义字体..." />
          </div>
        </div>
      </div>

      <!-- 字符模式 -->
      <div class="config-item">
        <label class="config-item-label">字符模式</label>
        <div class="config-item-content">
          <label class="radio-option">
            <input type="radio" class="patternSelect" name="patternSelect" value="1.0" checked />
            <span class="char-symbol">▞</span><span>方块元素（1.0~1.19.4）</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="patternSelect" name="patternSelect" value="1.20" />
            <span class="char-symbol">◛◚</span><span>方块元素（1.20+）</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="patternSelect" name="patternSelect" value="1.20-wide" />
            <span class="char-symbol">▄▀</span><span>方块元素 宽（1.20+）</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="patternSelect" name="patternSelect" value="braille" />
            <span class="char-symbol">⣤⠛</span><span>盲文符号</span>
          </label>
          <label class="radio-option">
            <input type="radio" class="patternSelect" name="patternSelect" value="custom" />
            <span>自定义</span>
          </label>
        </div>
        <div id="patternSection" class="custom-char-section">
          <div class="canvas-width-row">
            <label><span class="input-title">JE告示牌<br />横向像素数量</span> <input id="custom-pixelWidth-je-sign"
                type="number" min="0" step="2" value="20" /></label>
            <label><span class="input-title">JE悬挂式告示牌<br />横向像素数量</span> <input id="custom-pixelWidth-je-hangingSign"
                type="number" min="0" step="2" value="12" /></label>
            <label><span class="input-title">BE告示牌<br />横向像素数量</span> <input id="custom-pixelWidth-be-sign"
                type="number" min="0" step="2" value="20" /></label>
            <label><span class="input-title">BE悬挂式告示牌<br />横向像素数量</span> <input id="custom-pixelWidth-be-hangingSign"
                type="number" min="0" step="2" value="12" /></label>
          </div>
          <div id="patternWrapper"></div>
          <template id="patternTemplate">
            <label>
              <code class="input-title"></code>
              <input name="pattern" value="" />
            </label>
          </template>
        </div>
      </div>

      <!-- 微调标题 -->
      <div class="config-item">
        <div id="adjustToggle" class="adjust-toggle">微调</div>
      </div>

      <!-- 微调面板 -->
      <div id="adjustPanel" style="display:none;">
        <div class="adjust-section">
          <div class="adjust-params">
            <div class="adjust-param">
              <span class="input-title">横向偏移</span>
              <input id="adjustOffsetX" class="adjust-input" type="number" min="-1" max="1" step="0.01" value="0" />
            </div>
            <div class="adjust-param" id="adjustOffsetYRow">
              <span class="input-title">纵向偏移</span>
              <input id="adjustOffsetY" class="adjust-input" type="number" min="-1" max="1" step="0.01" value="0" />
            </div>
            <div class="adjust-param">
              <span class="input-title">阈值</span>
              <input id="adjustThreshold" class="adjust-input" type="number" min="0" max="255" step="1" value="127" />
            </div>
            <div class="adjust-param adjust-param--plain">
              <span class="input-title">&nbsp;</span>
              <button id="adjustReset" class="adjust-btn">还原</button>
            </div>
          </div>
          <div class="adjust-param">
            <span class="input-title">自动更新绘制</span>
            <div class="config-item-content">
              <label class="radio-option">
                <input type="radio" name="autoUpdate" value="on" />
                <span>开启</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="autoUpdate" value="off" checked />
                <span>关闭</span>
              </label>
            </div>
          </div>
        </div>
      </div>

    </div>
    <button type="button" onclick="main()" class="btn-primary">绘制</button>
  </div>
  <div id="rightPanel">
    <div id="previewWrapper">
      <div>预览</div>
      <div id="canvasWrapper"></div>
    </div>

    <div id="outputWrapper">
      <div class="output-title">输出结果</div>
      <div id="signsWrapper"></div>
    </div>
  </div>

  <script src="char.js"></script>
  <script src="font-coverage.js"></script>
  <script src="main.js"></script>
</body>

</html>
